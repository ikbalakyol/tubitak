<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÜBİTAK — ANP+TOPSIS Bulut KDS</title>
    
    <script>
        /* * ═══════════════════════════════════════════════════════════════
         * 🔑 BULUT BAĞLANTI AYARLARI (SUPABASE)
         * ═══════════════════════════════════════════════════════════════
         * Aşağıdaki iki tırnak içini kendi Supabase API ayarlarınla doldur.
         */
        
        const SB_URL = "BURAYA_PROJECT_URL_YAPISTIR"; 
        const SB_KEY = "https://okdqitbirdgghidamyxl"; 

        /* ═══════════════════════════════════════════════════════════════ */
   </script>

    <style>
        :root{
            --bg:#0b0d12; --bg2:#111318; --bg3:#181c24; 
            --tx:#dde1ec; --tx2:#8890a4; --tx3:#4e5668;
            --ac:#4b84f5; --ac3:#00bfa0; --gold:#f0c040;
            --bdr: rgba(255,255,255,0.06); --bdr2: rgba(255,255,255,0.11);
        }
        *{box-sizing:border-box; margin:0; padding:0}
        body{font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--tx); min-height:100vh}
        
        #portal-select{position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px}
        .ps-logo{text-align:center; margin-bottom:48px}
        .ps-cards{display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:700px; width:100%}
        
        .ps-card{
            background:var(--bg2); border:1px solid var(--bdr2); border-radius:16px;
            padding:40px 30px; cursor:pointer; transition:all 0.3s ease;
            text-align:center; position:relative; z-index: 100;
        }
        .ps-card:hover{transform:translateY(-5px); border-color:var(--ac); background:var(--bg3)}
        .ps-card * { pointer-events: none; } /* İçerdeki yazıların tıklamayı bozmasını engeller */

        .modal{position:fixed; inset:0; background:rgba(0,0,0,0.95); backdrop-filter:blur(10px); z-index:10000; display:none; align-items:center; justify-content:center}
        .modal.show{display:flex}
        .modal-content{background:var(--bg2); padding:40px; border-radius:16px; width:380px; border:1px solid var(--bdr2)}

        #app-shell{display:none; min-height:100vh; flex-direction: row;}
        #app-shell.show{display:flex}
        .sidebar{width:260px; background:var(--bg2); border-right:1px solid var(--bdr); display:flex; flex-direction:column}
        .main-content{flex:1; padding:30px; overflow-y:auto}

        .btn{padding:12px 20px; border-radius:6px; cursor:pointer; border:none; font-weight:600; background:var(--ac); color:white}
        input{background:var(--bg3); border:1px solid var(--bdr2); color:white; padding:12px; border-radius:6px; width:100%; margin-bottom:15px; outline:none}
        
        .page{display:none}
        .page.active{display:block}
        .nav-item{padding:12px 20px; cursor:pointer; color:var(--tx2); border-radius:8px; margin:5px 10px}
        .nav-item.active{background:var(--bg3); color:white}
    </style>
</head>
<body>

<div id="portal-select">
    <div class="ps-logo">
        <h1 style="font-family:Syne; font-size:32px">TÜBİTAK ANP+TOPSIS</h1>
        <p style="color:var(--tx3)">Endüstri Mühendisliği Bitirme Tezi v3.0</p>
    </div>
    <div class="ps-cards">
        <div class="ps-card" onclick="openLogin()">
            <span style="font-size:48px; display:block; margin-bottom:15px">🏛️</span>
            <div style="font-size:20px; font-weight:700; color:var(--ac); margin-bottom:10px">Yönetici Portalı</div>
            <div style="font-size:12px; color:var(--tx3)">Excel yükle ve buluta kaydet.</div>
        </div>
        <div class="ps-card" onclick="enterPortal('Üye')">
            <span style="font-size:48px; display:block; margin-bottom:15px">📋</span>
            <div style="font-size:20px; font-weight:700; color:var(--ac3); margin-bottom:10px">Üye Portalı</div>
            <div style="font-size:12px; color:var(--tx3)">Projeleri değerlendir ve sırala.</div>
        </div>
    </div>
</div>

<div id="login-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px; font-family:Syne">Giriş Yap</h2>
        <input type="text" id="adm-user" placeholder="Kullanıcı Adı (ikbal)">
        <input type="password" id="adm-pass" placeholder="Şifre (159)">
        <button class="btn" style="width:100%" onclick="checkLogin()">Giriş Yap</button>
        <p onclick="closeLogin()" style="text-align:center; margin-top:15px; cursor:pointer; color:var(--tx3)">İptal</p>
    </div>
</div>

<div id="app-shell">
    <aside class="sidebar">
        <div style="padding:25px; border-bottom:1px solid var(--bdr)">
            <div style="font-weight:800; color:var(--ac)">ESTÜ KDS</div>
            <div id="status" style="font-size:10px; color:var(--tx3)">BAĞLANTI BEKLENİYOR...</div>
        </div>
        <nav id="nav-list" style="padding:15px 0"></nav>
        <button class="btn" style="margin:20px; background:var(--bg3)" onclick="location.reload()">Çıkış</button>
    </aside>
    <main class="main-content">
        <div id="page-dash" class="page active">
            <h1>Sistem Özeti</h1>
            <div id="dash-info" style="margin-top:20px; padding:20px; background:var(--bg2); border-radius:10px">Veriler çekiliyor...</div>
        </div>
        <div id="page-upload" class="page">
            <h1>Veri Yükle</h1>
            <input type="file" id="xl" style="margin-top:20px" onchange="uploadData(this.files[0])">
            <div id="up-status" style="margin-top:15px"></div>
        </div>
    </main>
</div>

<script>
    // Supabase Başlatma
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    function openLogin() { document.getElementById('login-modal').classList.add('show'); }
    function closeLogin() { document.getElementById('login-modal').classList.remove('show'); }

    function checkLogin() {
        const u = document.getElementById('adm-user').value;
        const p = document.getElementById('adm-pass').value;
        if(u === "ikbal" && p === "159") enterPortal('Yönetici');
        else alert("Hatalı Giriş!");
    }

    async function enterPortal(role) {
        document.getElementById('portal-select').style.display = 'none';
        document.getElementById('login-modal').classList.remove('show');
        document.getElementById('app-shell').classList.add('show');
        
        const nav = document.getElementById('nav-list');
        let h = `<div class="nav-item active" onclick="showPage('dash')">Dashboard</div>`;
        if(role === 'Yönetici') h += `<div class="nav-item" onclick="showPage('upload')">Excel Yükle</div>`;
        nav.innerHTML = h;
        
        loadCloud();
    }

    async function loadCloud() {
        const { data } = await supabase.from('anp_data').select('*').order('created_at', { ascending: false }).limit(1);
        if(data && data.length > 0) {
            document.getElementById('status').textContent = "BULUT SENKRONİZE";
            document.getElementById('dash-info').innerHTML = `Son Yükleme: ${data[0].config_name}<br>Tarih: ${new Date(data[0].created_at).toLocaleString('tr-TR')}`;
        } else {
            document.getElementById('dash-info').textContent = "Veri bulunamadı.";
        }
    }

    async function uploadData(file) {
        if(!file) return;
        document.getElementById('up-status').textContent = "Yükleniyor...";
        const { error } = await supabase.from('anp_data').insert([{
            config_name: file.name,
            expert_count: 12,
            global_weights: { "T1": 0.1 }
        }]);
        if(!error) { alert("Kaydedildi!"); loadCloud(); showPage('dash'); }
        else alert("Hata: " + error.message);
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
    }
</script>
</body>
</html>
